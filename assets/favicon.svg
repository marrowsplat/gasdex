<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Charcoal background -->
  <rect width="100" height="100" fill="#0e0e10"/>

  <!-- Quartered circle base: blue/gold/blue/gold pattern (Rovers colours) -->
  <circle cx="50" cy="50" r="48" fill="#0d4f9e"/>

  <!-- White inner circle for contrast -->
  <circle cx="50" cy="50" r="42" fill="#ffc400"/>

  <!-- Bold "G" letter in navy, centred -->
  <text x="50" y="68" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#0d4f9e" text-anchor="middle" dominant-baseline="central">G</text>

  <!-- Small gold accent line under G (suggests "Index" or dynamism) -->
  <line x1="28" y1="78" x2="72" y2="78" stroke="#0d4f9e" stroke-width="2" stroke-linecap="round"/>
</svg>
