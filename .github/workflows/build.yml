name: Build & Deploy GasDex

on:
  # Run on schedule: hourly (GitHub may delay scheduled runs at busy times)
  schedule:
    - cron: '0 * * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

# Prevent concurrent runs overlapping
concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Restore rolling caches from data-cache branch
        # The rolling caches (results-history, news-history, fixtures-audit)
        # live on the dedicated `data-cache` branch, NOT on main. Only this
        # workflow ever writes to that branch, so the maintainer's pushes to
        # main can never conflict with cache updates. Do NOT move the caches
        # back onto main — that reintroduces the rebase-conflict problem.
        run: |
          mkdir -p data
          # Explicit refspec: the Actions checkout is single-branch, so a
          # plain `git fetch origin data-cache` would NOT create the
          # origin/data-cache tracking ref.
          if git fetch origin data-cache:refs/remotes/origin/data-cache; then
            git checkout origin/data-cache -- data/ || true
            git reset -q -- data/ || true  # unstage; caches are gitignored on main
            echo "Restored caches from data-cache branch"
          else
            echo "WARNING: data-cache branch not found — starting caches fresh"
          fi

      - name: Fetch News
        id: news
        timeout-minutes: 2
        continue-on-error: true
        run: |
          python3 tools/feeds/fetch_news.py

      - name: Fetch Club Announcements
        id: club
        timeout-minutes: 2
        continue-on-error: true
        run: |
          python3 tools/feeds/fetch_club.py

      - name: Fetch YouTube
        id: youtube
        timeout-minutes: 2
        continue-on-error: true
        run: |
          python3 tools/feeds/fetch_youtube.py

      - name: Fetch Results & Fixtures
        id: results
        timeout-minutes: 2
        continue-on-error: true
        run: |
          python3 tools/feeds/fetch_results.py

      - name: Build site
        run: |
          python3 tools/build_site.py

      - name: Copy internal pages to output
        run: |
          mkdir -p out
          cp site/report-example.html out/
          cp site/rate.html out/
          cp site/submit.html out/
          cp site/about.html out/
          # archive-news.html, archive-reports.html and archive-season.html
          # are RENDERED by build_site.py (do not copy the static samples
          # over them)
          cp site/404.html out/
          cp site/contact.html out/
          mkdir -p out/assets
          cp site/assets/*.png out/assets/

      - name: Validate output
        run: |
          python3 tools/validate.py out/*.html

      - name: Commit rolling caches to data-cache branch
        # Caches are committed to the dedicated data-cache branch so main
        # only ever moves when the maintainer pushes (no more rebase
        # conflicts on his machine). Uses a temporary worktree so the main
        # checkout used for the Pages deploy is never disturbed.
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if git fetch origin data-cache:refs/remotes/origin/data-cache; then
            git worktree add -B data-cache cache-wt origin/data-cache
          else
            # First run ever: create the branch as an orphan (no main history)
            git worktree add --detach cache-wt
            git -C cache-wt checkout --orphan data-cache
            git -C cache-wt rm -rfq --cached . || true
            find cache-wt -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi
          mkdir -p cache-wt/data
          for f in results-history.json news-history.json fixtures-audit.json; do
            if [ -f "data/$f" ]; then cp "data/$f" "cache-wt/data/$f"; fi
          done
          git -C cache-wt add -A data
          git -C cache-wt diff --cached --quiet || git -C cache-wt commit -m "chore: update rolling caches"
          git -C cache-wt push origin data-cache || true
          git worktree remove --force cache-wt || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Build summary
        if: always()
        run: |
          echo "## GasDex Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Feed | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| News | ${{ steps.news.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Club | ${{ steps.club.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YouTube | ${{ steps.youtube.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Results | ${{ steps.results.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Site deployed:** [View live](https://pages.github.com/)" >> $GITHUB_STEP_SUMMARY
